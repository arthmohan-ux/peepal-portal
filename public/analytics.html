<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — Peepal Hiring Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
  <style>
    /* ── ANALYTICS-SPECIFIC STYLES ── */
    .analytics-body { background: var(--slate-50); min-height: 100vh; display: flex; flex-direction: column; }

    .analytics-shell {
      position: sticky;
      top: 0;
      z-index: 120;
      background: white;
      box-shadow: 0 1px 0 rgba(15,23,42,0.06);
    }
    .analytics-shell .nav {
      position: static;
      z-index: auto;
    }
    .analytics-header {
      background: white;
      border-bottom: 1px solid var(--slate-200);
      padding: 18px 24px 18px;
    }
    .analytics-header .filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }

    /* Page layout */
    .analytics-content {
      flex: 1;
      padding: 28px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* Section cards */
    .analytics-section {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--slate-200);
      overflow: hidden;
    }
    .section-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--slate-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section-subtitle {
      font-size: 10px;
      font-weight: 500;
      color: var(--slate-400);
      margin-top: 2px;
    }
    .section-body { padding: 20px; overflow-x: auto; }
    .table-scroll-shell {
      overflow: auto;
      max-height: min(70vh, 720px);
      border: 1px solid var(--slate-100);
      border-radius: 12px;
      background: white;
    }

    /* Sub-tabs inside sections */
    .section-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--slate-100);
      padding: 0 20px;
    }
    .section-tab {
      padding: 8px 14px;
      font-size: 10px;
      font-weight: 700;
      color: var(--slate-400);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section-tab.active { color: #4338CA; border-bottom-color: #4338CA; }
    .section-tab:hover:not(.active) { color: var(--slate-600); }
    .section-tab-content { display: none; padding: 20px; overflow-x: auto; }
    .section-tab-content.active { display: block; }

    .page-tabs-shell {
      background: white;
      border: 1px solid var(--slate-200);
      border-radius: 16px;
      overflow: hidden;
    }
    .page-tabs {
      display: flex;
      gap: 0;
      padding: 0 20px;
      border-bottom: 1px solid var(--slate-100);
      overflow-x: auto;
    }
    .page-tab {
      border: none;
      background: none;
      cursor: pointer;
      padding: 14px 16px;
      font-size: 11px;
      font-weight: 800;
      color: var(--slate-400);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .page-tab.active {
      color: #4338CA;
      border-bottom-color: #4338CA;
    }
    .page-tab-panel {
      display: none;
      padding: 20px;
      background: var(--slate-50);
    }
    .page-tab-panel.active {
      display: block;
    }
    .page-tab-panel .analytics-section {
      border: 1px solid var(--slate-200);
      box-shadow: 0 10px 25px rgba(15,23,42,0.04);
    }

    /* Stats strip */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 4px;
    }
    .stat-card {
      background: var(--slate-50);
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid var(--slate-100);
    }
    .stat-card-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--slate-400);
      margin-bottom: 4px;
    }
    .stat-card-value {
      font-size: 26px;
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
    }
    .stat-card-sub {
      font-size: 10px;
      font-weight: 600;
      color: var(--slate-400);
      margin-top: 3px;
    }

    /* Funnel table */
    .funnel-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 11px;
      min-width: 900px;
      background: white;
    }
    .funnel-table th {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 8px 10px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: white;
      background: var(--navy);
      text-align: center;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .funnel-table thead th {
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.08);
    }
    .funnel-table th:first-child { text-align: left; border-radius: 8px 0 0 0; }
    .funnel-table th:nth-child(2) { text-align: left; }
    .funnel-table th:last-child { border-radius: 0 8px 0 0; border-right: none; }
    .funnel-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--slate-100);
      text-align: center;
      vertical-align: middle;
    }
    .funnel-table td:first-child { text-align: left; font-weight: 700; color: var(--slate-800); font-size: 11px; }
    .funnel-table td:nth-child(2) { color: var(--slate-400); font-size: 10px; font-weight: 600; }
    .funnel-table tr:last-child td { border-bottom: none; }
    .funnel-table tr:hover td { background: #F8F9FF; }
    .funnel-table .dept-row td {
      background: var(--slate-100);
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate-500);
      padding: 5px 10px;
    }
    .funnel-table .dept-row td:first-child { text-align: left; }
    .funnel-count {
      display: inline-block;
      min-width: 22px;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }
    .funnel-total {
      font-weight: 900;
      color: var(--navy);
      font-size: 13px;
    }
    .role-cell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .role-title {
      font-weight: 700;
      color: var(--slate-800);
      font-size: 11px;
    }
    .role-candidates {
      width: 100%;
    }
    .role-candidates summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      color: #4338CA;
      user-select: none;
    }
    .role-candidates summary::-webkit-details-marker { display: none; }
    .role-candidates summary::after {
      content: '▾';
      font-size: 10px;
      color: var(--slate-400);
      transition: transform 0.15s ease;
    }
    .role-candidates[open] summary::after {
      transform: rotate(180deg);
    }
    .role-candidate-list {
      margin-top: 10px;
      width: 100%;
      border: 1px solid var(--slate-100);
      border-radius: 10px;
      overflow: hidden;
      background: var(--slate-50);
    }
    .role-candidate-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    .role-candidate-table th,
    .role-candidate-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--slate-100);
      text-align: left;
      font-size: 10px;
      vertical-align: middle;
    }
    .role-candidate-table th {
      background: white;
      color: var(--slate-400);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .role-candidate-table th:first-child,
    .role-candidate-table td:first-child {
      width: 68%;
    }
    .role-candidate-table th:last-child,
    .role-candidate-table td:last-child {
      width: 32%;
    }
    .role-candidate-table tr:last-child td {
      border-bottom: none;
    }
    .role-candidate-name {
      display: inline-block;
      font-weight: 600;
      color: var(--slate-700);
      text-decoration: none;
      white-space: normal;
      word-break: break-word;
    }
    .role-candidate-name:hover {
      color: #4338CA;
      text-decoration: underline;
    }
    .role-candidate-status {
      font-weight: 700;
      color: var(--slate-600);
      white-space: normal;
      word-break: break-word;
    }
    .sourced-count {
      font-weight: 800;
      color: #4338CA;
    }

    /* Status colour classes for funnel cells */
    .fc-reject   { background: #FEE2E2; color: #B91C1C; }
    .fc-pending  { background: #FEF9C3; color: #92400E; }
    .fc-select   { background: #DCFCE7; color: #166534; }
    .fc-joined   { background: #D1FAE5; color: #065F46; }
    .fc-offered  { background: #DBEAFE; color: #1E40AF; }
    .fc-hold     { background: #FEF3C7; color: #92400E; }
    .fc-drop     { background: #F3F4F6; color: #6B7280; }

    /* TAT table */
    .tat-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 11px;
      min-width: 800px;
      background: white;
    }
    .tat-table th {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 8px 10px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: white;
      background: #004d40;
      text-align: center;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .tat-table thead th {
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.08);
    }
    .tat-table th:first-child { text-align: left; border-radius: 8px 0 0 0; }
    .tat-table th:nth-child(2) { text-align: center; }
    .tat-table th:last-child { border-radius: 0 8px 0 0; border-right: none; }
    .tat-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--slate-100);
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      vertical-align: middle;
    }
    .tat-table td:first-child { text-align: left; font-weight: 700; color: var(--slate-800); font-size: 11px; }
    .tat-table td:nth-child(2) { color: var(--slate-400); font-size: 10px; }
    .tat-table tr:last-child td { border-bottom: none; }
    .tat-table tr:hover td { background: #F0FDF9; }
    .tat-table .dept-row td {
      background: #E0F2F1;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #004d40;
      padding: 5px 10px;
    }
    .tat-table .dept-row td:first-child { text-align: left; }
    .tat-cell { padding: 3px 6px; border-radius: 6px; display: inline-block; font-weight: 800; font-size: 10px; white-space: nowrap; }
    .tat-green  { background: #DCFCE7; color: #166534; }
    .tat-yellow { background: #FEF9C3; color: #92400E; }
    .tat-red    { background: #FEE2E2; color: #B91C1C; }
    .tat-na     { color: var(--slate-300); font-size: 9px; font-weight: 500; }

    /* Bar chart */
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { font-size: 11px; font-weight: 600; color: var(--slate-700); width: 180px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--slate-100); border-radius: 999px; height: 22px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 999px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; transition: width 0.4s ease; min-width: 24px; }
    .bar-fill span { font-size: 10px; font-weight: 800; color: white; }
    .bar-count { font-size: 11px; font-weight: 700; color: var(--slate-500); width: 36px; text-align: right; flex-shrink: 0; }

    /* Month trend chart */
    .trend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
    .trend-month {
      background: var(--slate-50);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      border: 1px solid var(--slate-100);
      cursor: default;
      transition: all 0.15s;
    }
    .trend-month:hover { border-color: #6366F1; background: #F5F3FF; }
    .trend-month-label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--slate-400); margin-bottom: 6px; }
    .trend-month-count { font-size: 22px; font-weight: 900; color: var(--navy); line-height: 1; }
    .trend-month-sub { font-size: 9px; color: var(--slate-400); margin-top: 3px; font-weight: 600; }

    .ratio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .ratio-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);
      border: 1px solid var(--slate-200);
      border-radius: 14px;
      padding: 16px;
    }
    .ratio-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .ratio-card-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.4px;
      color: var(--navy);
      text-transform: uppercase;
    }
    .ratio-card-meta {
      font-size: 10px;
      color: var(--slate-400);
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }
    .ratio-card-value {
      font-size: 30px;
      line-height: 1;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .ratio-card-breakdown {
      font-size: 12px;
      color: var(--slate-700);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .ratio-card-note {
      font-size: 11px;
      color: var(--slate-500);
      line-height: 1.5;
    }
    .ratio-card.empty .ratio-card-value {
      color: var(--slate-300);
    }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; color: var(--slate-600); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* Loading / empty */
    .analytics-loading {
      display: flex; align-items: center; justify-content: center;
      padding: 60px; color: var(--slate-400); font-size: 13px;
      flex-direction: column; gap: 12px;
    }
    .empty-state { text-align: center; padding: 40px; color: var(--slate-400); font-size: 12px; font-weight: 600; }

    /* Recruiter table */
    .recruiter-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; }
    .recruiter-table th {
      padding: 9px 14px; font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.6px; color: white; background: var(--navy); text-align: left;
    }
    .recruiter-table th:first-child { border-radius: 8px 0 0 0; }
    .recruiter-table th:last-child { border-radius: 0 8px 0 0; text-align: center; }
    .recruiter-table td { padding: 10px 14px; border-bottom: 1px solid var(--slate-100); vertical-align: middle; }
    .recruiter-table td:not(:first-child) { text-align: center; font-weight: 700; }
    .recruiter-table tr:last-child td { border-bottom: none; }
    .recruiter-table tr:hover td { background: #F8F9FF; }
    .recruiter-name { font-weight: 800; color: var(--slate-800); font-size: 12px; }
    .conv-rate { font-weight: 900; font-size: 13px; }
    .conv-high { color: #166534; } .conv-mid { color: #92400E; } .conv-low { color: #B91C1C; }

    @media (max-width: 900px) {
      .analytics-content > div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body class="analytics-body">
  <div class="analytics-shell">
    <!-- NAV -->
    <nav class="nav">
      <div class="nav-left">
        <div class="nav-logo">P</div>
        <div class="nav-title"><strong>Peepal</strong> Hiring Portal</div>
        <a href="/dashboard" class="nav-link">Candidates</a>
        <a href="/analytics" class="nav-link active">Analytics</a>
      </div>
      <div class="nav-right">
        <span class="sync-badge sync-connecting" id="sync-badge">Loading...</span>
        <span class="user-name" id="user-name"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </nav>

    <!-- HEADER FILTERS -->
    <div class="analytics-header">
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">Department</span>
          <div id="filterDept" class="multi-select">
            <button type="button" class="multi-select-trigger" onclick="toggleMultiSelect('filterDept', event)">All Departments</button>
            <div class="multi-select-menu hidden"></div>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Role</span>
          <div id="filterRole" class="multi-select">
            <button type="button" class="multi-select-trigger" onclick="toggleMultiSelect('filterRole', event)">All Roles</button>
            <div class="multi-select-menu hidden"></div>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Recruiter</span>
          <select class="filter-select" id="filterRecruiter" onchange="applyFilters()">
            <option value="">All Recruiters</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Month</span>
          <div id="filterMonth" class="multi-select">
            <button type="button" class="multi-select-trigger" onclick="toggleMultiSelect('filterMonth', event)">All Months</button>
            <div class="multi-select-menu hidden"></div>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Week</span>
          <div id="filterWeek" class="multi-select">
            <button type="button" class="multi-select-trigger" onclick="toggleMultiSelect('filterWeek', event)">All Weeks</button>
            <div class="multi-select-menu hidden"></div>
          </div>
        </div>
        <div class="filter-group filter-group-actions">
          <button class="btn-clear" onclick="clearFilters()">↺ Reset</button>
          <button class="btn-sync" onclick="loadData()">⟳ Sync</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="analytics-content" id="analytics-content">
    <div class="analytics-loading" id="main-loading">
      <div class="spinner"></div>
      Loading analytics...
    </div>
  </div>

  <script src="/src/config.js"></script>
  <script src="/src/runtime-config.js?v=1"></script>
  <script src="/src/analytics.js?v=3"></script>
</body>
</html>
